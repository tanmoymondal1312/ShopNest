<nav class="navbar"
     x-data="{
       searchOpen: false,
       query: '{{ request.query_params.get('q') or '' }}',
       suggestions: [],
       sugOpen: false,
       debounce: null,
       loading: false,
       fetchSuggestions() {
         clearTimeout(this.debounce);
         if (this.query.trim().length < 2) { this.suggestions = []; this.sugOpen = false; return; }
         this.debounce = setTimeout(async () => {
           this.loading = true;
           try {
             const res = await fetch('/api/suggestions?q=' + encodeURIComponent(this.query));
             this.suggestions = await res.json();
             this.sugOpen = this.suggestions.length > 0;
           } catch(e) {}
           this.loading = false;
         }, 280);
       },
       go(slug) {
         this.sugOpen = false;
         window.location.href = '/product/' + slug;
       },
       search() {
         this.sugOpen = false;
         if (this.query.trim()) window.location.href = '/search?q=' + encodeURIComponent(this.query.trim());
       }
     }"
     @click.outside="sugOpen = false">
  <div class="container navbar-inner">

    <!-- ── Logo ────────────────────────────────────────────── -->
    <a href="/" class="navbar-logo" aria-label="{{ settings.store_name }}">
      <div class="navbar-logo-icon">
        {% if settings.logo %}
          <img src="/static/{{ settings.logo }}" alt="{{ settings.store_name }}">
        {% else %}
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
        {% endif %}
      </div>
      <div class="navbar-logo-text">
        <span class="navbar-logo-name">{{ settings.store_name }}</span>
        <span class="navbar-logo-tagline">{{ settings.tagline }}</span>
      </div>
    </a>

    <!-- ── Search ───────────────────────────────────────────── -->
    <div class="navbar-search" :class="{ open: searchOpen }">
      <div class="navbar-search-wrap" :class="{ active: sugOpen || searchOpen }">

        <div class="navbar-search-inner">
          <span class="navbar-search-icon">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35" stroke-linecap="round"/>
            </svg>
          </span>

          <input
            type="search"
            id="navbar-search"
            x-model="query"
            @input="fetchSuggestions()"
            @keydown.enter="search()"
            @keydown.escape="sugOpen = false"
            @focus="query.trim().length >= 2 && fetchSuggestions()"
            placeholder="পণ্য খুঁজুন…"
            aria-label="পণ্য খুঁজুন"
            autocomplete="off"
          >

          <!-- Loading spinner -->
          <span x-show="loading" class="navbar-search-spinner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                 style="animation:spin .7s linear infinite;">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </span>

          <button class="navbar-search-btn" @click="search()" aria-label="খুঁজুন">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35" stroke-linecap="round"/>
            </svg>
            <span class="navbar-search-btn-label">খুঁজুন</span>
          </button>
        </div>

        <!-- ── Suggestions dropdown ─────────────────────────── -->
        <div class="search-suggestions" x-show="sugOpen" x-transition:enter="sug-enter"
             x-transition:enter-start="sug-enter-start" x-transition:enter-end="sug-enter-end"
             x-transition:leave="sug-leave" x-transition:leave-start="sug-leave-start"
             x-transition:leave-end="sug-leave-end" style="display:none;">
          <template x-for="item in suggestions" :key="item.slug">
            <button class="sug-item" @click="go(item.slug)">
              <span class="sug-thumb">
                <template x-if="item.image">
                  <img :src="'/static/uploads/products/' + item.image" :alt="item.name">
                </template>
                <template x-if="!item.image">
                  <span class="sug-thumb-placeholder">📦</span>
                </template>
              </span>
              <span class="sug-info">
                <span class="sug-name" x-text="item.name"></span>
                <span class="sug-price" x-text="window.CURRENCY + item.price.toFixed(2)"></span>
              </span>
              <span class="sug-arrow">›</span>
            </button>
          </template>
          <a :href="'/search?q=' + encodeURIComponent(query)" class="sug-view-all" @click="sugOpen=false">
            "<span x-text="query"></span>" — সব ফলাফল দেখুন →
          </a>
        </div>

      </div>
    </div>

    <!-- ── Actions ──────────────────────────────────────────── -->
    <div class="navbar-actions">

      <!-- Mobile search toggle -->
      <button class="navbar-search-toggle" @click="searchOpen = !searchOpen"
              :aria-expanded="searchOpen" aria-label="সার্চ">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- WhatsApp -->
      {% if settings.whatsapp %}
      <a href="https://wa.me/{{ settings.whatsapp }}" class="navbar-wa-btn"
         target="_blank" rel="noopener" aria-label="WhatsApp">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l5.07-1.35A9.952 9.952 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/>
        </svg>
        <span class="navbar-wa-btn-text">যোগাযোগ</span>
      </a>
      {% endif %}

      <!-- Cart pill -->
      <button class="cart-btn" @click="$store.cart.openDrawer()" aria-label="কার্ট দেখুন">
        <span class="cart-btn-icon">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
        </span>
        <span class="cart-btn-label">কার্ট</span>
        <span class="cart-badge" x-text="$store.cart.count"
              x-show="$store.cart.count > 0" style="display:none;">0</span>
      </button>

    </div>
  </div>
</nav>
